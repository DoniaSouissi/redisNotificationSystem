<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse - Real-Time Notifications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-base:       #07080c;
            --bg-surface:    #0d0f16;
            --bg-elevated:   #131520;
            --bg-hover:      #1a1c27;
            --border:        rgba(255,255,255,0.055);
            --border-bright: rgba(255,255,255,0.11);
            --border-focus:  rgba(255,255,255,0.18);

            --cyan:       #00e5c3;
            --cyan-dim:   rgba(0,229,195,0.10);
            --cyan-glow:  rgba(0,229,195,0.22);
            --cyan-mid:   rgba(0,229,195,0.35);

            --red:        #ff4d6a;
            --red-dim:    rgba(255,77,106,0.10);
            --red-glow:   rgba(255,77,106,0.20);

            --green:      #2effa0;
            --green-dim:  rgba(46,255,160,0.10);
            --green-glow: rgba(46,255,160,0.20);

            --amber:      #ffb547;
            --amber-dim:  rgba(255,181,71,0.10);

            --text-primary:   #e6e9f4;
            --text-secondary: #888ca8;
            --text-muted:     #42465a;

            --radius-xs: 4px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;

            --font-display: 'Syne', sans-serif;
            --font-mono:    'DM Mono', monospace;

            --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-mono);
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---- Ambient background layers ---- */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 65% 50% at 75% 0%,   rgba(0,229,195,0.08)  0%, transparent 65%),
                radial-gradient(ellipse 50% 45% at 5%  90%,  rgba(255,77,106,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 40% 35% at 50% 50%,  rgba(46,255,160,0.03) 0%, transparent 55%);
            pointer-events: none; z-index: 0;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none; z-index: 0;
        }

        /* ---- Layout ---- */
        .app-wrapper {
            position: relative; z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 52px 24px 96px;
        }

        /* ---- Header ---- */
        .app-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            animation: slideDown 0.7s var(--ease-spring) both;
        }

        .logo-mark {
            width: 44px; height: 44px;
            background: var(--cyan-dim);
            border: 1px solid rgba(0,229,195,0.35);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 28px var(--cyan-glow), inset 0 1px 0 rgba(255,255,255,0.06);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .logo-mark::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
        }

        .logo-mark svg { color: var(--cyan); position: relative; z-index: 1; }

        .header-text { flex: 1; }

        .app-title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #fff;
            line-height: 1;
        }

        .app-title .dot { color: var(--cyan); }

        .app-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-top: 5px;
            font-style: italic;
        }

        .live-badge {
            display: flex; align-items: center; gap: 7px;
            padding: 6px 14px;
            background: var(--green-dim);
            border: 1px solid rgba(46,255,160,0.22);
            border-radius: 100px;
            font-size: 0.68rem;
            color: var(--green);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .live-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse-dot 2.2s ease-in-out infinite;
        }

        /* ---- Status Bar ---- */
        .status-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px;
            padding: 10px 18px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            animation: slideDown 0.6s 0.08s var(--ease-spring) both;
        }

        .status-left {
            display: flex; align-items: center; gap: 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.07em;
        }

        .status-sep { color: var(--border-bright); }

        .ws-status {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.7rem; font-weight: 500;
        }

        .ws-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--amber);
            transition: background 0.5s;
            flex-shrink: 0;
        }

        .ws-dot.connected { background: var(--green); animation: pulse-dot 2.5s ease-in-out infinite; }
        .ws-dot.demo      { background: var(--amber); animation: pulse-dot 3s ease-in-out infinite; }
        .ws-dot.error     { background: var(--red); }

        .ws-label { color: var(--text-secondary); }

        .user-tag {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--cyan);
            background: var(--cyan-dim);
            padding: 3px 12px;
            border-radius: 100px;
            border: 1px solid rgba(0,229,195,0.18);
            letter-spacing: 0.04em;
        }

        /* ---- Panels ---- */
        .panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 20px;
            transition: border-color 0.25s ease;
        }

        .panel:hover { border-color: var(--border-bright); }

        /* FIX: use explicit classes instead of broken nth-child (header/status-bar are siblings) */
        .panel-admin { animation: slideDown 0.55s 0.15s var(--ease-spring) both; }
        .panel-feed  { animation: slideDown 0.55s 0.25s var(--ease-spring) both; }

        .panel-header {
            display: flex; align-items: center; gap: 12px;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-elevated);
            position: relative;
            overflow: hidden;
        }

        .panel-header::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 2px;
        }

        .panel-admin .panel-header::before { background: linear-gradient(to bottom, var(--amber), transparent); }
        .panel-feed  .panel-header::before { background: linear-gradient(to bottom, var(--cyan), transparent); }

        .panel-icon {
            width: 32px; height: 32px;
            border-radius: var(--radius-xs);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .panel-icon.admin {
            background: var(--amber-dim);
            border: 1px solid rgba(255,181,71,0.22);
            color: var(--amber);
        }

        .panel-icon.notif {
            background: var(--cyan-dim);
            border: 1px solid rgba(0,229,195,0.22);
            color: var(--cyan);
        }

        .panel-titles { flex: 1; }

        .panel-title {
            font-family: var(--font-display);
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .panel-meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .panel-body { padding: 24px; }

        /* ---- Form Controls ---- */
        .field-group { margin-bottom: 16px; }

        .field-label {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 9px;
            font-weight: 500;
        }

        .styled-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-base);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.83rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .styled-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px var(--cyan-dim);
        }

        .styled-input::placeholder { color: var(--text-muted); }

        /* ---- Type Chips ---- */
        .type-chips {
            display: flex; gap: 8px; flex-wrap: wrap;
        }

        .type-chip {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 15px;
            border-radius: 100px;
            border: 1px solid var(--border-bright);
            background: var(--bg-base);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.74rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 400;
        }

        .type-chip:hover {
            border-color: rgba(255,255,255,0.25);
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .type-chip.active-order   { background: var(--cyan-dim);  border-color: rgba(0,229,195,0.4);   color: var(--cyan); }
        .type-chip.active-message { background: var(--green-dim); border-color: rgba(46,255,160,0.4); color: var(--green); }
        /* FIX: was active-system, now consistent active-system_alert */
        .type-chip.active-system_alert { background: var(--red-dim);   border-color: rgba(255,77,106,0.4);  color: var(--red); }

        .chip-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ---- Send Button ---- */
        .send-btn {
            width: 100%;
            padding: 14px 20px;
            background: var(--cyan);
            color: #07080c;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-display);
            font-size: 0.86rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.22s;
            display: flex; align-items: center; justify-content: center; gap: 9px;
            margin-top: 20px;
            box-shadow: 0 0 28px var(--cyan-glow);
            position: relative;
            overflow: hidden;
        }

        /* Shimmer sweep */
        .send-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -75%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            transition: none;
        }

        .send-btn:hover::before {
            animation: shimmer 0.6s ease forwards;
        }

        .send-btn:hover {
            background: #05f5d4;
            box-shadow: 0 0 44px var(--cyan-mid), 0 6px 20px rgba(0,229,195,0.28);
            transform: translateY(-2px);
        }

        .send-btn:active { transform: translateY(0); }
        .send-btn svg { flex-shrink: 0; }

        /* ---- Feed Toolbar ---- */
        .feed-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 13px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-elevated);
        }

        .notif-count {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.68rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .count-badge {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 20px; height: 20px;
            padding: 0 6px;
            background: var(--cyan-dim);
            border: 1px solid rgba(0,229,195,0.22);
            border-radius: 100px;
            font-size: 0.65rem;
            color: var(--cyan);
            font-weight: 600;
            transition: transform 0.2s var(--ease-spring);
        }

        .count-badge.pop { animation: badge-pop 0.35s var(--ease-spring); }

        .clear-btn {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font-mono);
            padding: 5px 10px;
            border-radius: var(--radius-xs);
            transition: color 0.2s, background 0.2s;
        }

        .clear-btn:hover { color: var(--red); background: var(--red-dim); }

        /* ---- Feed ---- */
        #feed {
            padding: 14px;
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-bright) transparent;
        }

        #feed::-webkit-scrollbar { width: 3px; }
        #feed::-webkit-scrollbar-track { background: transparent; }
        #feed::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

        /* ---- Empty State ---- */
        .empty-state {
            text-align: center;
            padding: 56px 20px;
            color: var(--text-muted);
        }

        .empty-ring {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 1.5px solid var(--border-bright);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            animation: breathe 3.5s ease-in-out infinite;
            box-shadow: 0 0 0 0 var(--cyan-dim);
        }

        .empty-ring svg { opacity: 0.25; }

        .empty-state p {
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .empty-state span {
            display: block;
            font-size: 0.62rem;
            margin-top: 6px;
            color: var(--text-muted);
            opacity: 0.6;
            letter-spacing: 0.06em;
        }

        /* ---- Notification Card ---- */
        .notification {
            display: flex;
            gap: 14px;
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            animation: notifSlide 0.38s var(--ease-spring) both;
            position: relative;
            overflow: hidden;
        }

        /* Left accent bar */
        .notification::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
        }

        /* Subtle type-tinted background */
        .notification::after {
            content: '';
            position: absolute; inset: 0;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .notification:hover {
            transform: translateX(4px);
            box-shadow: -4px 0 20px rgba(0,0,0,0.3);
        }

        .notification:hover::after { opacity: 1; }

        /* FIX: was .notification.system — corrected to .notification.system_alert */
        .notification.order_status::before         { background: var(--cyan); }
        .notification.order_status::after          { background: radial-gradient(ellipse 80% 60% at 0% 50%, rgba(0,229,195,0.05), transparent); }
        .notification.order_status:hover           { border-color: rgba(0,229,195,0.25); }

        .notification.message::before              { background: var(--green); }
        .notification.message::after               { background: radial-gradient(ellipse 80% 60% at 0% 50%, rgba(46,255,160,0.05), transparent); }
        .notification.message:hover                { border-color: rgba(46,255,160,0.25); }

        .notification.system_alert::before         { background: var(--red); }
        .notification.system_alert::after          { background: radial-gradient(ellipse 80% 60% at 0% 50%, rgba(255,77,106,0.05), transparent); }
        .notification.system_alert:hover           { border-color: rgba(255,77,106,0.25); }

        .notif-icon-wrap {
            width: 36px; height: 36px;
            border-radius: var(--radius-xs);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            position: relative; z-index: 1;
        }

        /* FIX: was .notification.system — now .notification.system_alert */
        .notification.order_status  .notif-icon-wrap { background: var(--cyan-dim);  color: var(--cyan); }
        .notification.message       .notif-icon-wrap { background: var(--green-dim); color: var(--green); }
        .notification.system_alert  .notif-icon-wrap { background: var(--red-dim);   color: var(--red); }

        .notif-content { flex: 1; min-width: 0; position: relative; z-index: 1; }

        .notif-type-tag {
            display: inline-block;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 600;
            padding: 2px 9px;
            border-radius: 100px;
            margin-bottom: 7px;
        }

        /* FIX: was .notification.system — now .notification.system_alert */
        .notification.order_status .notif-type-tag { color: var(--cyan);  background: var(--cyan-dim); }
        .notification.message      .notif-type-tag { color: var(--green); background: var(--green-dim); }
        .notification.system_alert .notif-type-tag { color: var(--red);   background: var(--red-dim); }

        .notif-message {
            font-size: 0.82rem;
            color: var(--text-primary);
            line-height: 1.5;
            word-break: break-word;
        }

        .notif-time {
            font-size: 0.64rem;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 0.06em;
            font-style: italic;
        }

        /* ---- Animations ---- */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes notifSlide {
            from { opacity: 0; transform: translateX(-14px) scale(0.98); }
            to   { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.45; transform: scale(0.65); }
        }

        @keyframes shimmer {
            0%   { left: -75%; }
            100% { left: 140%; }
        }

        @keyframes badge-pop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 0 0 var(--cyan-dim); border-color: var(--border-bright); }
            50%       { box-shadow: 0 0 0 8px transparent; border-color: rgba(0,229,195,0.15); }
        }

        /* ---- Responsive ---- */
        @media (max-width: 540px) {
            .app-wrapper    { padding: 28px 14px 64px; }
            .app-title      { font-size: 1.45rem; }
            .type-chip      { padding: 7px 11px; font-size: 0.7rem; }
            .panel-body     { padding: 18px 16px; }
            .panel-header   { padding: 15px 18px; }
            .feed-toolbar   { padding: 12px 18px; }
            #feed           { padding: 10px; }
            .live-badge     { padding: 5px 10px; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
        <div class="logo-mark">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        </div>
        <div class="header-text">
            <div class="app-title">Pulse<span class="dot">.</span></div>
            <div class="app-sub">Real-time notification system</div>
        </div>
        <div class="live-badge">
            <span class="live-dot"></span>
            Live
        </div>
    </header>

    <!-- Connection Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <div class="ws-status">
                <span class="ws-dot" id="wsDot"></span>
                <span class="ws-label" id="wsLabel">Connecting...</span>
            </div>
            <span class="status-sep">|</span>
            <span>SSE Stream</span>
        </div>
        <span class="user-tag">user123</span>
    </div>

    <!-- Admin Panel -->
    <div class="panel panel-admin">
        <div class="panel-header">
            <div class="panel-icon admin">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"/>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
            </div>
            <div class="panel-titles">
                <div class="panel-title">Admin Console</div>
                <div class="panel-meta">Trigger notification</div>
            </div>
        </div>
        <div class="panel-body">
            <div class="field-group">
                <label class="field-label">Notification Type</label>
                <div class="type-chips">
                    <button class="type-chip active-order" data-type="order_status" onclick="selectType(this,'order_status')">
                        <span class="chip-dot"></span>Order Status
                    </button>
                    <button class="type-chip" data-type="message" onclick="selectType(this,'message')">
                        <span class="chip-dot"></span>Direct Message
                    </button>
                    <button class="type-chip" data-type="system_alert" onclick="selectType(this,'system_alert')">
                        <span class="chip-dot"></span>System Alert
                    </button>
                </div>
                <input type="hidden" id="notifType" value="order_status">
            </div>
            <div class="field-group" style="margin-top:20px;">
                <label class="field-label" for="notifMessage">Message Content</label>
                <input
                    class="styled-input"
                    type="text"
                    id="notifMessage"
                    placeholder="Enter notification message..."
                    onkeydown="if(event.key==='Enter') sendNotification()"
                />
            </div>
            <button class="send-btn" onclick="sendNotification()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">

<script>
    const USER_ID   = "user123";
    const feed      = document.getElementById('feed');
    const emptyState = document.getElementById('emptyState');
    const countBadge = document.getElementById('countBadge');
    const wsDot     = document.getElementById('wsDot');
    const wsLabel   = document.getElementById('wsLabel');
    let notifCount  = 0;
    let isDemoMode  = false;

    /* ---- SVG icon map (FIX: <triangle> replaced with valid <polygon>) ---- */
    const typeIcons = {
        order_status: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"/>
            <polyline points="16.5 9.4 7.55 4.24"/>
            <polyline points="3.29 7 12 12 20.71 7"/>
            <line x1="12" y1="22" x2="12" y2="12"/>
            <circle cx="18.5" cy="15.5" r="2.5"/>
            <path d="M20.27 17.27L22 19"/>
        </svg>`,
        message: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        /* FIX: was invalid <triangle> SVG element — replaced with <polygon> */
        system_alert: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <line x1="12" y1="17" x2="12.01" y2="17"/>

    };

    const typeLabels = {
        order_status:  'Order Status',
        message:       'Direct Message',
        system_alert:  'System Alert'
    };

    /* ---- Chip selector (FIX: class name now matches active-system_alert) ---- */
    function selectType(el, type) {
        document.getElementById('notifType').value = type;
        document.querySelectorAll('.type-chip').forEach(c => { c.className = 'type-chip'; });
        const classMap = {
            order_status:  'active-order',
            message:       'active-message',
            system_alert:  'active-system_alert'   // FIX: was 'active-system'
        };
        el.className = 'type-chip ' + classMap[type];
    }

    /* ---- SSE Connection (graceful demo fallback) ---- */
    let eventSource;
    function connectLiveStream() {
        try {
            eventSource = new EventSource(`/stream/${USER_ID}`);

            eventSource.onopen = () => {
                wsDot.className  = 'ws-dot connected';
                wsLabel.textContent   = 'Connected';
                wsLabel.style.color   = 'var(--green)';
                isDemoMode = false;
            };

            eventSource.onerror = () => {
                if (!isDemoMode) {
                    isDemoMode = true;
                    wsDot.className       = 'ws-dot demo';
                    wsLabel.textContent   = 'Demo Mode';
                    wsLabel.style.color   = 'var(--amber)';
                }
            };

            eventSource.onmessage = (event) => {
                try {
                    const notif = JSON.parse(event.data);
                    addNotificationToUI(notif, false);
                } catch(e) { /* malformed payload */ }
            };
        } catch(e) {
            isDemoMode = true;
            wsDot.className     = 'ws-dot demo';
            wsLabel.textContent = 'Demo Mode';
            wsLabel.style.color = 'var(--amber)';
        }
    }

    /* ---- Load history ---- */
    async function loadHistory() {
        try {
            const res = await fetch(`/history/${USER_ID}`);
            if (!res.ok) return;
            const history = await res.json();
            if (Array.isArray(history)) history.forEach(n => addNotificationToUI(n, true));
        } catch(e) { /* no backend — silently skip */ }
    }

    /* ---- Render notification (XSS-safe via textContent) ---- */
    function addNotificationToUI(notif, isHistory = false) {
        if (emptyState && emptyState.parentNode === feed) emptyState.remove();

        notifCount++;
        countBadge.textContent = notifCount;
        countBadge.classList.remove('pop');
        void countBadge.offsetWidth; // reflow to retrigger animation
        countBadge.classList.add('pop');

        const type  = notif.type || 'order_status';
        const label = typeLabels[type] || type;
        const icon  = typeIcons[type]  || typeIcons['order_status'];

        const date = notif.timestamp
            ? new Date(parseFloat(notif.timestamp) * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
            : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        const div = document.createElement('div');
        div.className = `notification ${type}`;
        div.innerHTML = `
            <div class="notif-icon-wrap">${icon}</div>
            <div class="notif-content">
                <span class="notif-type-tag">${label}</span>
                <div class="notif-message"></div>
                <div class="notif-time">${date}</div>
            </div>
        `;
        div.querySelector('.notif-message').textContent = notif.message || '';

        if (isHistory) feed.appendChild(div);
        else           feed.prepend(div);
    }

    /* ---- Send notification ---- */
    async function sendNotification() {
        const type = document.getElementById('notifType').value;
        const msg  = document.getElementById('notifMessage').value.trim();
        const input = document.getElementById('notifMessage');

        if (!msg) {
            input.focus();
            input.style.borderColor = 'var(--red)';
            input.style.boxShadow   = '0 0 0 3px var(--red-dim)';
            setTimeout(() => {
                input.style.borderColor = '';
                input.style.boxShadow   = '';
            }, 1300);
            return;
        }

        let sentViaBackend = false;
        try {
            const res = await fetch('/send', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ user_id: USER_ID, notif_type: type, message: msg })
            });
            if (res.ok) sentViaBackend = true;
        } catch(e) { /* no backend */ }

        /* Demo fallback — show locally if no backend responded */
        if (!sentViaBackend) {
            addNotificationToUI({ type, message: msg, timestamp: Date.now() / 1000 }, false);
        }

        input.value = '';
    }

    /* ---- Clear feed ---- */
    function clearFeed() {
        feed.innerHTML = '';
        notifCount = 0;
        countBadge.textContent = '0';
        feed.appendChild(emptyState);
    }

    /* ---- Init ---- */
    connectLiveStream();
    loadHistory();
</script>
